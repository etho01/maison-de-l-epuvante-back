apiVersion: apps/v1
kind: Deployment
metadata:
  name: maison-epouvante-back
  namespace: maison-epouvante
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: maison-epouvante-back
  template:
    metadata:
      labels:
        app: maison-epouvante-back
    spec:
      securityContext:
        fsGroup: 33
      initContainers:
        - name: generate-jwt-keys
          image: ghcr.io/etho01/maison-epouvante-back:latest
          command: ["/usr/local/bin/generate-jwt-keys.sh"]
          securityContext:
            runAsUser: 0  # Root nécessaire pour créer et chown les fichiers
            runAsNonRoot: false
          envFrom:
            - secretRef:
                name: maison-epouvante-back-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /jwt-keys
      containers:
        - name: app
          image: ghcr.io/etho01/maison-epouvante-back:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 33
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: maison-epouvante-back-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /var/www/project/config/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: jwt-keys
          emptyDir: {}