apiVersion: apps/v1
kind: Deployment
metadata:
  name: maison-epouvante-back
  namespace: maison-epouvante
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: maison-epouvante-back
  template:
    metadata:
      labels:
        app: maison-epouvante-back
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        fsGroup: 33
      containers:
        - name: app
          image: ghcr.io/etho01/maison-de-l-epuvante-back:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 33
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: maison-epouvante-back-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /var/www/project/config/jwt
              readOnly: true
          # Probes temporairement désactivées pour debug
          # readinessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          env:
            - name: APP_ENV
              value: "prod"
            - name: APP_DEBUG
              value: "0"
            - name: JWT_SECRET_KEY
              value: /var/www/project/config/jwt/private.pem
            - name: JWT_PUBLIC_KEY
              value: /var/www/project/config/jwt/public.pem
          # livenessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: 80
          #   initialDelaySeconds: 30
          #   periodSeconds: 20
          #   timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: jwt-keys
          secret:
            secretName: maison-epouvante-back-secret
            items:
              - key: JWT_PRIVATE_KEY
                path: private.pem
                mode: 0644
              - key: JWT_PUBLIC_KEY
                path: public.pem
                mode: 0644