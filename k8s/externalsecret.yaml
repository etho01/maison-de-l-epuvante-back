apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: maison-epouvante-back-vault
  namespace: maison-epouvante
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: maison-epouvante-back-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: maison-epouvante/app
