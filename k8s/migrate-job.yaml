apiVersion: batch/v1
kind: Job
metadata:
  name: maison-epouvante-back-migrate
  namespace: maison-epouvante
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        fsGroup: 33
      containers:
        - name: migrate
          image: ghcr.io/etho01/maison-de-l-epuvante-back:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 33
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: maison-epouvante-back-secret
          command: 
            - /bin/sh
            - -c
            - |
              echo "Creating database if not exists..."
              php bin/console doctrine:database:create --if-not-exists --no-interaction
              echo "Running migrations..."
              php bin/console doctrine:migrations:migrate --no-interaction
              echo "✅ Database setup complete"