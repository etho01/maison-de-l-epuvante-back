<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/project/public
    
    # Forward Authorization header to PHP
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    
    # Pass environment variables to PHP
    PassEnv APP_ENV
    PassEnv APP_SECRET
    PassEnv DATABASE_HOST
    PassEnv DATABASE_PORT
    PassEnv DATABASE_NAME
    PassEnv DATABASE_USER
    PassEnv DATABASE_PASSWORD
    PassEnv JWT_PASSPHRASE
    PassEnv CORS_ALLOW_ORIGIN
    PassEnv MAILER_DSN
    PassEnv STRIPE_SECRET_KEY
    PassEnv DEFAULT_URI
    PassEnv FRONTEND_URL
    
    <Directory /var/www/project/public>
        AllowOverride All
        Require all granted
        
        FallbackResource /index.php
    </Directory>
    
    <Directory /var/www/project/public/bundles>
        FallbackResource disabled
    </Directory>
    
    ErrorLog /var/log/apache2/project_error.log
    CustomLog /var/log/apache2/project_access.log combined
</VirtualHost>
